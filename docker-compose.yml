# Docker Compose only — NOT a Dockerfile. For PaaS (EasyPanel, etc.), point build at ./Dockerfile
services:
  mcp:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY:-}
      CONTEXT7_API_KEYS: ${CONTEXT7_API_KEYS:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
